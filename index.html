<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Haven</title>

  <!-- FAVICON -->
  <link rel="icon" type="image/png" href="final_logo-1.png">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      color: white;
      height: 100vh;
      overflow: hidden;
    }

    /* 🎬 FONDO ANIMADO PRO */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;

      background: url('e776007700b6a38c2848bfe333535d516de1ee06.gif') center/cover no-repeat;

      filter: blur(8px) brightness(0.4) contrast(1.2);
      z-index: -2;
    }

    /* 💜 OVERLAY MORADO */
    body::after {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;

      background: rgba(106, 0, 255, 0.15);

      z-index: -1;
    }

    .title {
      position: absolute;
      top: 150px;
      width: 100%;
      text-align: center;
      font-size: 42px;
      font-weight: 800;
      color: #a855f7;
      text-shadow: 0 0 25px #6a00ff;
    }

    .layout {
      display: flex;
      height: 100%;
    }

    .side {
      width: 30%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-end;
      gap: 40px;
      padding: 0 20px;
    }

    .side.right {
      align-items: flex-start;
    }

    .center {
      width: 40%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .logo {
      width: 320px;
      opacity: 0.95;
    }

    .btn {
      width: 240px;
      padding: 18px;
      background: linear-gradient(135deg, #2a003f, #6a00ff);
      color: white;
      border-radius: 18px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 14px;
      font-weight: 600;
      border: 1px solid #b266ff;
      box-shadow: 0 0 15px rgba(106, 0, 255, 0.5);
    }

    .btn:hover {
      transform: scale(1.08);
      background: linear-gradient(135deg, #6a00ff, #b266ff);
      box-shadow: 0 0 35px rgba(178, 102, 255, 1);
    }
  </style>
</head>
<body>

  <h1 class="title">Staff Guides</h1>

  <div class="layout">

    <!-- IZQUIERDA (ESPAÑOL) -->
    <div class="side">
      <div class="btn" onclick="window.open('https://docs.google.com/document/d/1e4u3n29qw3avHxDVMx-0ondeAHhZJ5N4UJt_1lxP5v4/preview','_blank')">
        [ESP] Ranks Guide
      </div>

      <div class="btn" onclick="window.open('https://docs.google.com/document/d/1R4Ar94kxa-JpuwY6MMjyCy4Upn8A9C_g3y9Q8_f2CoA/preview','_blank')">
        [ESP] Disabled Services Guide
      </div>

      <div class="btn" onclick="window.open('https://docs.google.com/document/d/1RBmuicXwjWJVxyGsf2DIOqxA1DGuNjGEnHGOjdAutE/preview','_blank')">
        [ESP] Staff Guide
      </div>
    </div>

    <!-- CENTRO -->
    <div class="center">
      <img src="final_logo-1.png" class="logo">
    </div>

    <!-- DERECHA (INGLÉS) -->
    <div class="side right">
      <div class="btn" onclick="window.open('https://docs.google.com/document/d/1Fhn8Ptubv6v_bug9gnoeAOyduOmRtxJPOZcwpyTTlOc/preview','_blank')">
        [ENG] Ranks Guide
      </div>

      <div class="btn" onclick="window.open('https://docs.google.com/document/d/1V32U32VPpGX2KgUTVfG1kdpiBhQEvikRwRHI2QKWwTs/preview','_blank')">
        [ENG] Disabled Services Guide
      </div>

      <div class="btn" onclick="window.open('https://docs.google.com/document/d/1KQqM_dcDfT7kvxHq9UahjMafbES53sVYR19HXupoZuM/preview','_blank')">
        [ENG] Staff Guide
      </div>
    </div>

  </div>

</body>
</html>
