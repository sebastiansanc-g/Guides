<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Haven Staff Guides</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #000;
      color: white;
      height: 100vh;
      overflow: hidden;
    }

    /* TITULO */
    .title {
      position: absolute;
      top: 150px;
      width: 100%;
      text-align: center;
      font-size: 42px;
      font-weight: 800;
      color: #a855f7;
      text-shadow: 0 0 25px rgba(168,85,247,0.8);
    }

    .layout {
      display: flex;
      height: 100%;
    }

    /* LADOS MÁS CERCA DEL CENTRO */
    .side {
      width: 30%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-end;
      gap: 40px;
      padding: 0 20px;
    }

    .side.right {
      align-items: flex-start;
    }

    /* CENTRO MÁS COMPACTO */
    .center {
      width: 40%;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    iframe {
      width: 100%;
      height: 80%;
      border: none;
      border-radius: 14px;
      background: #111;
      display: none;
    }

    .logo {
      width: 320px;
      opacity: 0.95;
    }

    /* BOTONES MÁS PRO */
    .btn {
      width: 240px;
      padding: 18px;
      background: linear-gradient(135deg, #a855f7, #ffffff);
      color: black;
      border-radius: 18px;
      text-align: center;
      cursor: pointer;
      transition: 0.3s;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 0 25px rgba(168,85,247,0.6);
    }

    .btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 40px rgba(168,85,247,1);
    }
  </style>
</head>
<body>

  <h1 class="title">Haven Staff Guides</h1>

  <div class="layout">

    <!-- IZQUIERDA -->
    <div class="side">
      <div class="btn" onclick="loadDoc('https://docs.google.com/document/d/1e4u3n29qw3avHxDVMx-0ondeAHhZJ5N4UJt_1lxP5v4/preview')">
        [ESP] Ranks Guide
      </div>

      <div class="btn" onclick="loadDoc('https://docs.google.com/document/d/1Fhn8Ptubv6v_bug9gnoeAOyduOmRtxJPOZcwpyTTlOc/preview')">
        [ENG] Ranks Guide
      </div>

      <div class="btn" onclick="loadDoc('https://docs.google.com/document/d/1R4Ar94kxa-JpuwY6MMjyCy4Upn8A9C_g3y9Q8_f2CoA/preview')">
        [ESP] Disabled Services Guide
      </div>
    </div>

    <!-- CENTRO -->
    <div class="center">
      <img src="final_logo-1.png" id="logo" class="logo">
      <iframe id="viewer"></iframe>
    </div>

    <!-- DERECHA -->
    <div class="side right">
      <div class="btn" onclick="loadDoc('https://docs.google.com/document/d/1RBmuicXwjWJVxyGsf2DIOqxA1DGuNjJgEnHGOjdAutE/preview')">
        [ESP] Staff Guide
      </div>

      <div class="btn" onclick="loadDoc('https://docs.google.com/document/d/1KQqM_dcDfT7kvxHq9UahjMafbES53sVYR19HXupoZuM/preview')">
        [ENG] Staff Guide
      </div>

      <div class="btn" onclick="loadDoc('https://docs.google.com/document/d/1V32U32VPpGX2KgUTVfG1kdpiBhQEvikRwRHI2QKWwTs/preview')">
        [ENG] Disabled Services Guide
      </div>
    </div>

  </div>

  <script>
    function loadDoc(url) {
      document.getElementById("viewer").src = url;
      document.getElementById("viewer").style.display = "block";
      document.getElementById("logo").style.display = "none";
    }
  </script>

</body>
</html>
